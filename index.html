<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Buttercup Academy</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Playfair+Display:wght@600;700;800&display=swap');

    :root {
      --paper: #fff9f3;
      --ink: #4f342d;
      --muted: #8c6b5e;
      --rose: #c95f86;
      --rose-soft: #ffd9e8;
      --butter: #fff0a8;
      --gold: #b8872f;
      --line: rgba(83, 52, 43, .18);
      --shadow: 0 22px 70px rgba(83, 52, 43, .13);
      --theme-a: #ffd4a3;
      --theme-b: #fff0bd;
      --theme-c: #e7a86c;
      --theme-ink: #653d2f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 18px;
      background: linear-gradient(135deg, #fffaf6 0%, #fff0c8 42%, #ffddea 72%, #fff7df 100%);
    }

    /* Mobile Nav Toggle */
    .nav-toggle { display: none; position: fixed; top: 15px; left: 15px; z-index: 100; background: var(--paper); border: 1px solid var(--line); border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-size: 20px; }

    .app { display: grid; grid-template-columns: 295px 1fr; min-height: 100vh; }

    aside {
      position: sticky; top: 0; height: 100vh; padding: 24px 18px;
      border-right: 1px solid var(--line); background: rgba(255,248,236,.95);
      z-index: 50; overflow-y: auto;
    }

    main { padding: 38px; width: 100%; max-width: 1200px; margin: 0 auto; }

    /* Responsive adjustments */
    @media (max-width: 980px) {
      .nav-toggle { display: block; }
      .app { grid-template-columns: 1fr; }
      aside { display: none; position: fixed; inset: 0; width: 100%; height: 100%; z-index: 90; }
      aside.active { display: block; }
      main { padding: 70px 18px 20px 18px; }
      .hero, .two, .calendar-shell, .grid { grid-template-columns: 1fr; }
    }

    /* ... [Include all your original remaining CSS here] ... */
  </style>
</head>

<body>
  <button class="nav-toggle" onclick="toggleNav()">☰</button>

  <div class="app">
    <aside id="sidebar">
       <!-- ... [Keep your existing nav menu code here] ... -->
    </aside>

    <main>
      <!-- ... [Keep your existing sections here] ... -->
    </main>
  </div>

  <script>
    function toggleNav() { document.getElementById("sidebar").classList.toggle("active"); }

    function showPage(id, preserveScroll = false) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      
      // Close menu on mobile
      if (window.innerWidth <= 980) document.getElementById("sidebar").classList.remove("active");
      
      if (!preserveScroll) window.scrollTo({ top: 0, behavior: "smooth" });
    }
    
    // ... [Keep your existing script logic] ...
  </script>
</body>
</html>
